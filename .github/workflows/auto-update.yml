name: Scheduled Submodule Update

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout parent repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}
          submodules: true
          fetch-depth: 0

      - name: Pull latest submodule commits
        run: |
          git submodule foreach '
            git fetch origin
            git checkout $(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)
            git reset --hard origin/$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)
          '

      - name: Commit and push if changed
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "Submodules already up to date — nothing to commit."
            exit 0
          fi

          git commit -m "chore: automated submodule sync to latest repos"
          git push
